<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BANAHub Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080e;--bg1:#0a0c16;--bg2:#0f1220;--bg3:#14172a;--bg4:#191d33;
  --bdr:#1e2238;--bdr2:#252a44;--bdr3:#2e3452;
  --gold:#c8973a;--gold2:#e0b354;--gold3:rgba(200,151,58,.13);--gold4:rgba(200,151,58,.05);
  --teal:#1dc9a8;--teal2:rgba(29,201,168,.12);--teal3:rgba(29,201,168,.06);
  --red:#e05555;--red2:rgba(224,85,85,.12);
  --blue:#4d9ef8;--blue2:rgba(77,158,248,.12);
  --amber:#e09840;--amber2:rgba(224,152,64,.12);
  --violet:#9b6ef0;--violet2:rgba(155,110,240,.12);
  --txt0:#dde6f8;--txt1:#7d8db0;--txt2:#474f6e;--txt3:#2a3050;
  --fd:'Cormorant Garamond',Georgia,serif;
  --fb:'Outfit',sans-serif;
  --fm:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--txt0);font-family:var(--fb);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
button{cursor:pointer;font-family:var(--fb)}
input,select,textarea{font-family:var(--fb)}

/* ── LOGIN SCREEN ── */
#login-screen{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .4s,transform .4s}
#login-screen.out{opacity:0;transform:scale(1.03);pointer-events:none}
.login-bg{position:absolute;inset:0;background:radial-gradient(ellipse 70% 60% at 50% 40%,rgba(200,151,58,.06) 0%,transparent 60%),radial-gradient(ellipse 40% 40% at 80% 70%,rgba(29,201,168,.04) 0%,transparent 60%)}
.login-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:52px 52px}
.login-box{position:relative;z-index:2;width:100%;max-width:400px;padding:0 24px}
.login-logo{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:32px}
.login-logo .lm{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),#8a5e1a);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:600;font-size:16px;color:#180e00}
.login-logo .ln{font-family:var(--fd);font-size:20px;font-weight:500;letter-spacing:.05em}
.login-logo .ln em{color:var(--gold2);font-style:italic}
.login-badge{display:flex;justify-content:center;margin-bottom:28px}
.login-badge span{padding:4px 14px;background:var(--gold3);border:1px solid rgba(200,151,58,.25);border-radius:20px;font-size:11px;font-weight:600;color:var(--gold2);letter-spacing:.08em;text-transform:uppercase}
.login-card{background:var(--bg2);border:1px solid var(--bdr2);border-radius:12px;padding:30px}
.login-title{font-family:var(--fd);font-size:22px;font-weight:500;text-align:center;margin-bottom:6px}
.login-sub{font-size:12px;color:var(--txt2);text-align:center;margin-bottom:24px}
.login-error{background:var(--red2);border:1px solid rgba(224,85,85,.3);border-radius:6px;padding:9px 12px;font-size:12px;color:var(--red);margin-bottom:14px;display:none}
.login-error.show{display:block}
.fl{margin-bottom:14px}
.fl label{display:block;font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px}
.fi{width:100%;background:var(--bg3);border:1px solid var(--bdr2);border-radius:6px;color:var(--txt0);padding:10px 12px;font-size:13px;outline:none;transition:border-color .15s}
.fi:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,151,58,.08)}
.fi::placeholder{color:var(--txt3)}
.btn-login{width:100%;padding:11px;background:var(--gold);color:#180e00;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;margin-top:4px}
.btn-login:hover{background:var(--gold2)}
.btn-login:active{transform:scale(.98)}
.login-hint{font-size:11px;color:var(--txt3);text-align:center;margin-top:14px;line-height:1.5}

/* ── SHELL ── */
#app-shell{display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
.sidebar{width:240px;min-width:240px;background:var(--bg1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;height:100vh}
.sb-top{padding:18px 16px 14px;border-bottom:1px solid var(--bdr)}
.lm{width:28px;height:28px;background:linear-gradient(135deg,var(--gold),#8a5e1a);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:600;font-size:13px;color:#180e00;flex-shrink:0}
.ln{font-family:var(--fd);font-size:17px;font-weight:500;letter-spacing:.05em;color:var(--txt0)}
.ln em{color:var(--gold2);font-style:italic}
.admin-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--gold3);border:1px solid rgba(200,151,58,.22);border-radius:20px;font-size:10px;font-weight:600;color:var(--gold2);letter-spacing:.06em;text-transform:uppercase;margin-top:8px}
.sb-user{padding:10px 10px;border-bottom:1px solid var(--bdr)}
.sb-user-inner{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:7px;background:var(--bg3)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0}
.sb-nav{flex:1;overflow-y:auto;padding:8px 8px}
.ns{padding:11px 8px 4px;font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.12em}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:6px;font-size:13px;color:var(--txt1);cursor:pointer;transition:all .12s;margin-bottom:1px;border:1px solid transparent;user-select:none}
.ni:hover{background:var(--bg3);color:var(--txt0)}
.ni.on{background:var(--gold3);color:var(--gold2);border-color:rgba(200,151,58,.18)}
.ni-ic{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.bc{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.sb-bottom{padding:10px 10px;border-top:1px solid var(--bdr)}

/* ── MAIN AREA ── */
.main{flex:1;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;background:var(--bg)}
.topbar{height:52px;background:var(--bg1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 22px;gap:12px;position:sticky;top:0;z-index:50;flex-shrink:0}

/* ── PAGE TRANSITIONS ── */
.page-wrap{padding:22px 24px;flex:1}
@keyframes pageIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pageOut{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-8px)}}
.page-in{animation:pageIn .24s ease forwards}
.page-out{animation:pageOut .16s ease forwards}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 16px;border-radius:6px;font-size:13px;font-weight:500;transition:all .14s;border:1px solid transparent;cursor:pointer;white-space:nowrap;user-select:none}
.btn:active{transform:scale(.97)}
.btn-gold{background:var(--gold);color:#1a0e00;border-color:var(--gold)}
.btn-gold:hover{background:var(--gold2)}
.btn-teal{background:var(--teal);color:#03120e;border-color:var(--teal)}
.btn-teal:hover{background:#22e4bc}
.btn-outline{background:transparent;color:var(--txt0);border-color:var(--bdr2)}
.btn-outline:hover{background:var(--bg3)}
.btn-ghost{background:transparent;color:var(--txt1);border-color:transparent}
.btn-ghost:hover{background:var(--bg3);color:var(--txt0)}
.btn-danger{background:var(--red2);color:var(--red);border-color:rgba(224,85,85,.28)}
.btn-danger:hover{background:rgba(224,85,85,.2)}
.btn-success{background:var(--teal2);color:var(--teal);border-color:rgba(29,201,168,.28)}
.btn-success:hover{background:rgba(29,201,168,.2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-lg{padding:10px 24px;font-size:14px}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:9px}
.card-gold{background:var(--gold4);border:1px solid rgba(200,151,58,.18);border-radius:9px}
.card-red{background:var(--red2);border:1px solid rgba(224,85,85,.22);border-radius:9px}
.card-teal{background:var(--teal3);border:1px solid rgba(29,201,168,.16);border-radius:9px}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.tt{background:var(--teal2);color:var(--teal);border:1px solid rgba(29,201,168,.2)}
.tg{background:var(--gold3);color:var(--gold2);border:1px solid rgba(200,151,58,.2)}
.tb{background:var(--blue2);color:var(--blue);border:1px solid rgba(77,158,248,.2)}
.ta{background:var(--amber2);color:var(--amber);border:1px solid rgba(224,152,64,.2)}
.tr{background:var(--red2);color:var(--red);border:1px solid rgba(224,85,85,.2)}
.tv{background:var(--violet2);color:var(--violet);border:1px solid rgba(155,110,240,.2)}
.tm{background:var(--bg3);color:var(--txt2);border:1px solid var(--bdr)}

/* ── FORM ── */
.input{background:var(--bg2);border:1px solid var(--bdr2);border-radius:6px;color:var(--txt0);padding:8px 12px;font-size:13px;width:100%;outline:none;transition:border-color .15s}
.input:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,151,58,.07)}
.input::placeholder{color:var(--txt3)}
.sel{background:var(--bg2);border:1px solid var(--bdr2);border-radius:6px;color:var(--txt0);padding:7px 12px;font-size:12px;outline:none;cursor:pointer}
.lbl{display:block;font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--bdr);white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--bdr);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.015)}

/* ── STAT ── */
.sc{background:var(--bg2);border:1px solid var(--bdr);border-radius:9px;padding:16px 18px}
.sc-l{font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px}
.sc-v{font-size:26px;font-weight:400;font-family:var(--fd);line-height:1.1}
.sc-s{font-size:11px;color:var(--txt3);margin-top:3px}

/* ── PROGRESS ── */
.pb{height:3px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}

/* ── MODAL OVERLAY ── */
.modal-ov{position:fixed;inset:0;background:rgba(5,6,14,.88);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .2s}
.modal-ov.open{opacity:1;pointer-events:all}
.modal{background:var(--bg2);border:1px solid var(--bdr2);border-radius:12px;padding:26px;width:90%;max-width:460px;max-height:88vh;overflow-y:auto;transform:translateY(12px);transition:transform .22s}
.modal-ov.open .modal{transform:translateY(0)}

/* ── MISC ── */
.div{border:none;border-top:1px solid var(--bdr);margin:14px 0}
.ph{font-family:var(--fd);font-size:20px;font-weight:500;letter-spacing:.01em}
.ps{font-size:12px;color:var(--txt2);margin-top:1px}
.sth{font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.1em}
.notice{border-radius:7px;padding:11px 14px;font-size:12px;line-height:1.65}
.nb{background:var(--blue2);border:1px solid rgba(77,158,248,.2);color:var(--txt1)}
.na{background:var(--amber2);border:1px solid rgba(224,152,64,.2);color:var(--txt1)}
.nr{background:var(--red2);border:1px solid rgba(224,85,85,.2);color:var(--txt1)}
.nt{background:var(--teal3);border:1px solid rgba(29,201,168,.16);color:var(--txt1)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
.dt{background:var(--teal)}.dr{background:var(--red)}.da{background:var(--amber)}.dm{background:var(--txt3)}
.ndot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid var(--bg1)}
.cb{width:15px;height:15px;border:1px solid var(--bdr2);border-radius:3px;background:var(--bg2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;vertical-align:middle}
.cb.on{background:var(--gold);border-color:var(--gold)}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;transition:all .25s;opacity:0;transform:translateY(8px);pointer-events:none}
#toast.show{opacity:1;transform:translateY(0)}
.toast-inner{padding:11px 18px;border-radius:8px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:9px;box-shadow:0 4px 24px rgba(0,0,0,.4)}
.toast-success{background:var(--bg3);border:1px solid rgba(29,201,168,.3);color:var(--teal)}
.toast-error{background:var(--bg3);border:1px solid rgba(224,85,85,.3);color:var(--red)}

/* ── TOGGLE ── */
.toggle-wrap{display:flex;align-items:center;gap:8px}
.toggle{width:38px;height:20px;border-radius:10px;background:var(--bdr3);border:1px solid var(--bdr2);cursor:pointer;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--teal)}
.toggle-knob{position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:2px;left:2px;transition:left .18s}
.toggle.on .toggle-knob{left:20px}
</style>
</head>

// ── AUTH ───────────────────────────────────────────────────────────────────

function attemptLogin() {
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const err = document.getElementById('loginError');
  if (u === STATE.creds.username && p === STATE.creds.password) {
    err.classList.remove('show');
    document.getElementById('login-screen').classList.add('out');
    setTimeout(() => {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app-shell').style.display = 'flex';
      STATE.loggedIn = true;
      render();
    }, 420);
  } else {
    err.classList.add('show');
    document.getElementById('loginPass').value = '';
    document.getElementById('loginPass').focus();
  }
}

document.getElementById('loginPass').addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
document.getElementById('loginUser').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('loginPass').focus(); });

function logout() {
  STATE.loggedIn = false;
  document.getElementById('app-shell').style.display = 'none';
  const ls = document.getElementById('login-screen');
  ls.style.display = 'flex';
  ls.classList.remove('out');
  document.getElementById('loginUser').value = '';
  document.getElementById('loginPass').value = '';
  document.getElementById('loginError').classList.remove('show');
}

// ── TOAST ─────────────────────────────────────────────────────────────────

let toastTimer;
function toast(msg, type = 'success') {
  const t = document.getElementById('toast');
  const inner = document.getElementById('toastInner');
  inner.className = `toast-inner toast-${type}`;
  inner.innerHTML = (type === 'success' ? '✓ ' : '✕ ') + msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ── MODAL ─────────────────────────────────────────────────────────────────

function openModal(html) {
  document.getElementById('modalBox').innerHTML = html;
  document.getElementById('modalOv').classList.add('open');
}
function closeModal() { document.getElementById('modalOv').classList.remove('open'); }
function closeModalIfOuter(e) { if (e.target === document.getElementById('modalOv')) closeModal(); }

// ── NAVIGATION ────────────────────────────────────────────────────────────

let transitioning = false;
function goto(pg) {
  if (pg === STATE.page || transitioning) return;
  transitioning = true;
  const content = document.getElementById('page-content');
  content.classList.add('page-out');
  setTimeout(() => {
    STATE.page = pg;
    content.classList.remove('page-out');
    renderPage();
    renderSidebar();
    content.classList.add('page-in');
    setTimeout(() => { content.classList.remove('page-in'); transitioning = false; }, 260);
  }, 160);
}

// ── HELPERS ───────────────────────────────────────────────────────────────

function stag(s) {
  const m = { active:'tt', pending:'ta', suspended:'tr', succeeded:'tt', failed:'tr', past_due:'ta',
    upcoming:'tb', completed:'tm', open:'tt', waitlist:'ta', 'intro sent':'tb', 'meeting scheduled':'tt',
    'profile shared':'ta', declined:'tr', company:'tt', partner:'tb', advisor:'ta', advisory:'tg',
    pro:'tt', program:'tm', expert:'tb' };
  return `<span class="tag ${m[s?.toLowerCase()] || 'tm'}">${s?.replace(/_/g,' ')}</span>`;
}
function sc(l, v, s = '', accent = false) {
  return `<div class="sc"><div class="sc-l">${l}</div><div class="sc-v"${accent ? ' style="color:var(--gold2)"' : ''}>${v}</div>${s ? `<div class="sc-s">${s}</div>` : ''}</div>`;
}
function pb(pct, color = 'var(--teal)') {
  return `<div class="pb"><div class="pf" style="width:${Math.min(100, pct)}%;background:${color}"></div></div>`;
}
function esc(str) { return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function initials(name) { return (name || '??').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase(); }
function roleColor(role) {
  return { company: 'var(--teal)', partner: 'var(--blue)', advisor: 'var(--amber)', admin: 'var(--gold2)' }[role] || 'var(--txt2)';
}

// ── USER ACTIONS ──────────────────────────────────────────────────────────

function setUF(v) { STATE.userFilter = v; STATE.selected.clear(); renderPage(); renderSidebar(); }
function filterUsers(v) { STATE.userSearch = v; renderPage(); }
function toggleSelect(id) {
  if (STATE.selected.has(id)) STATE.selected.delete(id); else STATE.selected.add(id);
  renderPage();
}
function toggleAll() {
  if (STATE.selected.size === STATE.users.length) STATE.selected.clear();
  else STATE.users.forEach(u => STATE.selected.add(u.id));
  renderPage();
}
function clearSelection() { STATE.selected.clear(); renderPage(); }

function approveUser(id) {
  const u = STATE.users.find(u => u.id === id);
  if (!u) return;
  u.status = 'active';
  saveUsers();
  toast(`${u.name} approved and activated`);
  renderPage(); renderSidebar();
}

function confirmReject(id) {
  const u = STATE.users.find(u => u.id === id);
  if (!u) return;
  openModal(`
    <div style="font-family:var(--fd);font-size:20px;font-weight:500;margin-bottom:8px">Reject application</div>
    <div style="font-size:13px;color:var(--txt1);margin-bottom:18px">Reject <strong style="color:var(--txt0)">${esc(u.name)}</strong> (${esc(u.company)})? This will notify them and archive the application.</div>
    <div style="margin-bottom:14px"><label class="lbl">Reason (optional — will be emailed)</label>
      <textarea id="rejectReason" class="input" rows="3" placeholder="Stage mismatch, incomplete profile..."></textarea></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-danger" style="flex:1" onclick="rejectUser(${id})">Confirm Reject</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

function rejectUser(id) {
  const u = STATE.users.find(u => u.id === id);
  if (!u) return;
  u.status = 'rejected';
  saveUsers();
  closeModal();
  toast(`${u.name} application rejected`, 'error');
  renderPage(); renderSidebar();
}

function confirmSuspend(id) {
  const u = STATE.users.find(u => u.id === id);
  if (!u) return;
  openModal(`

function suspendUser(id) {

  u.status = 'suspended';
  if (reason) u.notes = reason;
  saveUsers();
  closeModal();
  toast(`${u.name} account suspended`, 'error');
  renderPage(); renderSidebar();
}

function restoreUser(id) {
  const u = STATE.users.find(u => u.id === id);
  if (!u) return;
  u.status = 'active';
  saveUsers();
  toast(`${u.name} account restored`);
  renderPage(); renderSidebar();
}

function bulkApprove() {
  let count = 0;
  STATE.selected.forEach(id => {
    const u = STATE.users.find(u => u.id === id);
    if (u && u.status === 'pending') { u.status = 'active'; count++; }
  });
  STATE.selected.clear();
  saveUsers();
  toast(`${count} users approved`);
  renderPage(); renderSidebar();
}

        <option ${m.type==='Family Office'?'selected':''}>Family Office</option>
      </select></div>
      <div><label class="lbl">Stage</label><select class="sel" id="em_stage" style="width:100%">
        <option ${m.stage==='Intro Sent'?'selected':''}>Intro Sent</option>
        <option ${m.stage==='Profile Shared'?'selected':''}>Profile Shared</option>
        <option ${m.stage==='Meeting Scheduled'?'selected':''}>Meeting Scheduled</option>
        <option ${m.stage==='Declined'?'selected':''}>Declined</option>
      </select></div>
    </div>
    <div style="margin-bottom:14px"><label class="lbl">Notes</label>
      <textarea class="input" id="em_note" rows="2">${esc(m.note)}</textarea></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-gold" style="flex:1" onclick="saveMatch(${id})">Save</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

function saveMatch(id) {
  const m = STATE.matches.find(m => m.id === id);
  if (!m) return;
  m.company = document.getElementById('em_company')?.value || m.company;
  m.partner = document.getElementById('em_partner')?.value || m.partner;
  m.type = document.getElementById('em_type')?.value || m.type;
  m.stage = document.getElementById('em_stage')?.value || m.stage;
  m.note = document.getElementById('em_note')?.value || m.note;
  closeModal();
  toast('Introduction updated');
  renderPage();
}

function logMatch(id) {
  const m = STATE.matches.find(m => m.id === id);
  if (!m) return;
  openModal(`
    <div style="font-family:var(--fd);font-size:20px;font-weight:500;margin-bottom:6px">Log Activity</div>
    <div style="font-size:12px;color:var(--txt2);margin-bottom:14px">${esc(m.company)} → ${esc(m.partner)}</div>
    <div style="margin-bottom:14px"><label class="lbl">Activity update</label>
      <textarea class="input" id="log_note" rows="3" placeholder="What happened? Response received, meeting notes..."></textarea></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-gold" style="flex:1" onclick="toast('Activity logged for ${esc(m.company)}');closeModal()">Log Activity</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

function openNewIntroModal() {
  openModal(`
    <div style="font-family:var(--fd);font-size:20px;font-weight:500;margin-bottom:16px">New Introduction</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
      <div><label class="lbl">Company</label><select class="sel" id="ni_company" style="width:100%">
        ${STATE.users.filter(u=>u.role==='company'&&u.status==='active').map(u=>`<option>${esc(u.company)}</option>`).join('')}
      </select></div>
      <div><label class="lbl">Capital partner</label><input class="input" id="ni_partner" placeholder="Partner name"/></div>
      <div><label class="lbl">Type</label><select class="sel" id="ni_type" style="width:100%">
        <option>VC</option><option>PE</option><option>Angel</option><option>Family Office</option>
      </select></div>
      <div><label class="lbl">Coordinator</label><input class="input" id="ni_advisor" placeholder="Aini Zulaikha" value="Aini Zulaikha"/></div>
    </div>
    <div style="margin-bottom:14px"><label class="lbl">Initial note</label>
      <textarea class="input" id="ni_note" rows="2" placeholder="Reason for introduction, sector fit..."></textarea></div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-gold" style="flex:1" onclick="addIntro()">Create Introduction</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>`);
}

function addIntro() {
  const company = document.getElementById('ni_company')?.value;
  const partner = document.getElementById('ni_partner')?.value?.trim();
  if (!partner) { toast('Partner name required', 'error'); return; }
  STATE.matches.push({
    id: STATE.matches.length + 10,
    company: company || '',
    partner,
    type: document.getElementById('ni_type')?.value || 'VC',
    stage: 'Intro Sent',
    date: 'Jan 23',
    advisor: document.getElementById('ni_advisor')?.value || 'Aini Zulaikha',
    note: document.getElementById('ni_note')?.value || '',
  });
  closeModal();
  toast(`Introduction created: ${company} → ${partner}`);
  renderPage();
}

// ── PAYMENTS PAGE ─────────────────────────────────────────────────────────

function pagePayments() {
  const total = STATE.payments.filter(p => p.status === 'succeeded').reduce((s, p) => s + p.amount, 0);
  const failed = STATE.payments.filter(p => p.status === 'failed' || p.status === 'past_due');
  renderTopbar('Payments', 'Revenue and billing management',
    `<button class="btn btn-outline btn-sm" onclick="exportCSV()">Export CSV</button>`);
  return `
    <div class="g4" style="margin-bottom:14px">
      ${sc('Revenue (MTD)', `S$${total.toLocaleString()}`, '↑ 9.8% MoM', true)}
      ${sc('Transactions', STATE.payments.length, 'this period')}
      ${sc('Failed / Overdue', failed.length, failed.length ? 'Action required' : 'All clear')}
      ${sc('Avg Transaction', `S$${Math.round(total / STATE.payments.filter(p=>p.status==='succeeded').length)}`)}
    </div>
    ${failed.length > 0 ? `
      <div class="card-red" style="padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;gap:12px">
        <span style="font-size:18px">⚠️</span>
        <div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--red)">${failed.length} payment failure${failed.length > 1 ? 's' : ''} detected</div>
        <div style="font-size:12px;color:var(--txt1)">Stripe dunning emails sent. Manual follow-up may be required.</div></div>
        <button class="btn btn-danger btn-sm" onclick="toast('Opening failed payment queue')">Review Failed</button>
      </div>` : ''}
    <div class="card" style="overflow:hidden">
      <div style="padding:10px 14px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center">
        <div class="sth">All transactions</div>
        <div style="display:flex;gap:8px">
          <select class="sel"><option>All Types</option><option>Advisory Retainer</option><option>Program Enrollment</option><option>Onboarding Assessment</option></select>
          <select class="sel"><option>All Status</option><option>Succeeded</option><option>Failed</option><option>Past Due</option></select>
        </div>
      </div>
      <table class="tbl">
        <thead><tr><th>Member</th><th>Type</th><th>Amount</th><th>Status</th><th>Date</th><th>Reference</th><th>Action</th></tr></thead>
        <tbody>
          ${STATE.payments.map(p => `<tr>
            <td style="font-weight:500">${esc(p.user)}</td>
            <td style="font-size:12px;color:var(--txt2)">${p.type}</td>
            <td style="font-family:var(--fm);font-size:12px">S$${p.amount}</td>
            <td>${stag(p.status)}</td>
            <td style="font-size:12px;color:var(--txt2)">${p.date}</td>
            <td style="font-family:var(--fm);font-size:11px;color:var(--txt3)">${p.ref}</td>
            <td><div style="display:flex;gap:4px">
              ${(p.status==='failed'||p.status==='past_due') ? `<button class="btn btn-danger btn-xs" onclick="retryPayment(${p.id})">↺ Retry</button>` : ''}
              <button class="btn btn-ghost btn-xs" onclick="viewInvoice(${p.id})">View</button>
            </div></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
}

function retryPayment(id) {
  const p = STATE.payments.find(p => p.id === id);
  if (!p) return;
  toast(`Retry charge queued for ${p.user} — ${p.ref}`);
}

function viewInvoice(id) {
  const p = STATE.payments.find(p => p.id === id);
  if (!p) return;
  openModal(`
    <div style="display:flex;justify-content:space-between;margin-bottom:16px">
      <div style="font-family:var(--fd);font-size:20px;font-weight:500">Invoice ${p.ref}</div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
    </div>
    ${[['Member', p.user], ['Type', p.type], ['Amount', `S$${p.amount}`], ['Status', p.status], ['Date', p.date], ['Reference', p.ref]].map(([l,v]) => `
      <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px">
        <span style="color:var(--txt2)">${l}</span><span>${esc(String(v))}</span>
      </div>`).join('')}
    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn btn-outline" style="flex:1" onclick="toast('Invoice PDF downloaded');closeModal()">Download PDF</button>
      <button class="btn btn-ghost" onclick="closeModal()">Close</button>
    </div>`);
}

function exportCSV() {
  const rows = [['Member','Type','Amount','Status','Date','Reference']];
  STATE.payments.forEach(p => rows.push([p.user, p.type, `S$${p.amount}`, p.status, p.date, p.ref]));
  const csv = rows.map(r => r.join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csv);
  a.download = 'banahub-payments.csv';
  a.click();
  toast('Payments CSV downloaded');
}

function exportReport() { toast('Report export queued — check your email'); }

// ── SETTINGS PAGE ─────────────────────────────────────────────────────────

function pageSettings() {
  renderTopbar('Settings & Security', 'Platform configuration and admin credentials');
  const s = STATE.settings;
  return `
    <div class="g2">
      <div>
        <div class="sth" style="margin-bottom:12px">Platform configuration</div>
        <div class="card" style="padding:18px;margin-bottom:14px">
          <div style="margin-bottom:12px"><label class="lbl">Platform name</label><input class="input" id="s_name" value="${esc(s.platformName)}"/></div>
          <div style="margin-bottom:12px"><label class="lbl">Company</label><input class="input" id="s_company" value="${esc(s.company)}"/></div>
          <div style="margin-bottom:12px"><label class="lbl">Admin contact email</label><input class="input" id="s_email" type="email" value="${esc(s.adminEmail)}"/></div>
          <div style="margin-bottom:16px">
            <label class="lbl">Currency</label>
            <select class="sel" id="s_currency" style="width:100%">
              <option ${s.currency==='SGD'?'selected':''}>SGD</option>
              <option ${s.currency==='USD'?'selected':''}>USD</option>
              <option ${s.currency==='MYR'?'selected':''}>MYR</option>
            </select>
          </div>
          <div style="margin-bottom:12px">
            <label class="lbl" style="margin-bottom:8px">Platform features</label>
            <div style="display:flex;flex-direction:column;gap:10px">
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div><div style="font-size:13px">New registrations</div><div style="font-size:11px;color:var(--txt2)">Allow new users to apply</div></div>
                <div class="toggle${s.newRegistrations?' on':''}" id="tog_reg" onclick="toggleSetting('newRegistrations')"><div class="toggle-knob"></div></div>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div><div style="font-size:13px">Email notifications</div><div style="font-size:11px;color:var(--txt2)">Send system emails</div></div>
                <div class="toggle${s.emailNotifications?' on':''}" id="tog_email" onclick="toggleSetting('emailNotifications')"><div class="toggle-knob"></div></div>
              </div>
              <div style="display:flex;justify-content:space-between;align-items:center">
                <div><div style="font-size:13px;color:var(--red)">Maintenance mode</div><div style="font-size:11px;color:var(--txt2)">Lock platform for all users</div></div>
                <div class="toggle${s.maintenanceMode?' on':''}" id="tog_maint" onclick="toggleSetting('maintenanceMode')"><div class="toggle-knob"></div></div>
              </div>
            </div>
          </div>
          <button class="btn btn-gold btn-sm" onclick="saveSettings()">Save Platform Settings</button>
        </div>

        <div class="sth" style="margin-bottom:12px">Onboarding fees</div>
        <div class="card" style="padding:16px">
          ${[['Company / Founder','S$299'],['Capital Partner','S$199'],['Expert Advisor','S$149']].map(([l,v]) => `
            <div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--bdr);font-size:13px">
              <span style="color:var(--txt2)">${l}</span>
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-family:var(--fm);color:var(--gold2)">${v}</span>
                <button class="btn btn-ghost btn-xs" onclick="toast('Fee editor coming soon')">Edit</button>
              </div>
            </div>`).join('')}
        </div>
      </div>

      <div>
        <div class="sth" style="margin-bottom:12px">Admin credentials</div>
        <div class="card-gold" style="padding:20px;margin-bottom:14px">
          <div style="font-size:13px;font-weight:600;color:var(--gold2);margin-bottom:12px">🔐 Change Admin Password</div>
          <div style="margin-bottom:10px"><label class="lbl">Current password</label>
            <input class="input" id="cp_current" type="password" placeholder="••••••••"/></div>
          <div style="margin-bottom:10px"><label class="lbl">New username</label>
            <input class="input" id="cp_user" placeholder="${esc(STATE.creds.username)}"/></div>
          <div style="margin-bottom:10px"><label class="lbl">New password</label>
            <input class="input" id="cp_new" type="password" placeholder="Min 8 characters"/></div>
          <div style="margin-bottom:14px"><label class="lbl">Confirm new password</label>
            <input class="input" id="cp_confirm" type="password" placeholder="Repeat new password"/></div>
          <button class="btn btn-gold btn-sm" onclick="changeCredentials()">Update Credentials</button>
          <div style="font-size:11px;color:var(--txt3);margin-top:10px">Changes take effect immediately. You will be logged out.</div>
        </div>

        <div class="sth" style="margin-bottom:12px">Compliance & legal</div>
        <div class="card" style="padding:16px">
          <div style="font-size:12px;font-weight:600;color:var(--gold2);margin-bottom:10px">⚖️ Compliance checklist</div>
          ${['Capital matching templates include MAS disclaimer','Advisor profiles state "Not a licensed financial advisor"','Website footer includes regulatory notice','Terms of Use limits capital introduction scope','Admin access protected by password'].map(item => `
            <div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid var(--bdr2);font-size:12px;color:var(--txt1)">
              <span style="color:var(--teal);flex-shrink:0">✓</span>${item}
            </div>`).join('')}
        </div>
      </div>
    </div>`;
}

function toggleSetting(key) {
  STATE.settings[key] = !STATE.settings[key];
  const togMap = { newRegistrations: 'tog_reg', emailNotifications: 'tog_email', maintenanceMode: 'tog_maint' };
  const el = document.getElementById(togMap[key]);
  if (el) el.classList.toggle('on', STATE.settings[key]);
  saveSettings();
  toast(`${key.replace(/([A-Z])/g,' $1').toLowerCase()} ${STATE.settings[key] ? 'enabled' : 'disabled'}`);
}

function saveSettings() {
  STATE.settings.platformName = document.getElementById('s_name')?.value || STATE.settings.platformName;
  STATE.settings.company = document.getElementById('s_company')?.value || STATE.settings.company;
  STATE.settings.adminEmail = document.getElementById('s_email')?.value || STATE.settings.adminEmail;
  STATE.settings.currency = document.getElementById('s_currency')?.value || STATE.settings.currency;
  localStorage.setItem('bh_settings', JSON.stringify(STATE.settings));
  toast('Platform settings saved');
}

function changeCredentials() {
  const current = document.getElementById('cp_current')?.value;
  const newUser = document.getElementById('cp_user')?.value?.trim();
  const newPass = document.getElementById('cp_new')?.value;
  const confirm = document.getElementById('cp_confirm')?.value;
  if (current !== STATE.creds.password) { toast('Current password is incorrect', 'error'); return; }
  if (newPass && newPass.length < 8) { toast('New password must be at least 8 characters', 'error'); return; }
  if (newPass && newPass !== confirm) { toast('New passwords do not match', 'error'); return; }
  if (newUser) STATE.creds.username = newUser;
  if (newPass) STATE.creds.password = newPass;
  saveCreds();
  toast('Credentials updated — please log in again');
  setTimeout(() => logout(), 1500);
}

// ── RENDER ─────────────────────────────────────────────────────────────────

const PAGES = {
  overview: pageOverview,
  users: pageUsers,
  programs: pagePrograms,
  sessions: pageSessions,
  matches: pageMatches,
  payments: pagePayments,
  settings: pageSettings,
};

function renderPage() {
  const fn = PAGES[STATE.page];
  const content = fn ? fn() : '<div style="padding:24px;color:var(--txt2)">Page not found</div>';
  document.getElementById('page-content').innerHTML = content || '';
}

function render() {
  renderSidebar();
  renderPage();
}
</script>
</body>
</html>
