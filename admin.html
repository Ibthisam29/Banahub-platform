<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BANAHub Admin — Operations Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080e;--bg1:#0a0c16;--bg2:#0f1220;--bg3:#14172a;--bg4:#191d33;
  --bdr:#1e2238;--bdr2:#252a44;--bdr3:#2e3452;
  --gold:#c8973a;--gold2:#e0b354;--gold3:rgba(200,151,58,.13);--gold4:rgba(200,151,58,.05);
  --teal:#1dc9a8;--teal2:rgba(29,201,168,.12);--teal3:rgba(29,201,168,.05);
  --red:#e05555;--red2:rgba(224,85,85,.12);
  --blue:#4d9ef8;--blue2:rgba(77,158,248,.12);
  --amber:#e09840;--amber2:rgba(224,152,64,.12);
  --violet:#9b6ef0;--violet2:rgba(155,110,240,.12);
  --txt0:#dde6f8;--txt1:#7d8db0;--txt2:#474f6e;--txt3:#2a3050;
  --fd:'Cormorant Garamond',Georgia,serif;
  --fb:'Outfit',sans-serif;
  --fm:'JetBrains Mono',monospace;
}
*{font-family:var(--fb)}
html,body{height:100%;background:var(--bg);color:var(--txt0);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
button{cursor:pointer}

/* LAYOUT */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:240px;min-width:240px;background:var(--bg1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;height:100vh}
.sb-top{padding:18px 16px 14px;border-bottom:1px solid var(--bdr)}
.lm{width:28px;height:28px;background:linear-gradient(135deg,var(--gold),#8a5e1a);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:600;font-size:13px;color:#180e00;flex-shrink:0}
.ln{font-family:var(--fd);font-size:17px;font-weight:500;letter-spacing:.05em;color:var(--txt0)}
.ln em{color:var(--gold2);font-style:italic}
.admin-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--gold3);border:1px solid rgba(200,151,58,.2);border-radius:20px;font-size:10px;font-weight:600;color:var(--gold2);letter-spacing:.06em;text-transform:uppercase;margin-top:8px}
.sb-nav{flex:1;overflow-y:auto;padding:8px 8px}
.ns{padding:11px 8px 4px;font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.12em}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:6px;font-size:13px;color:var(--txt1);cursor:pointer;transition:all .12s;margin-bottom:1px}
.ni:hover{background:var(--bg3);color:var(--txt0)}
.ni.on{background:var(--gold3);color:var(--gold2);border:1px solid rgba(200,151,58,.18)}
.ni-ic{font-size:14px;width:20px;text-align:center;flex-shrink:0}
.badge-count{margin-left:auto;background:var(--red);color:#fff;font-size:10px;font-weight:600;padding:1px 6px;border-radius:10px;min-width:18px;text-align:center}
.sb-bottom{padding:10px 10px;border-top:1px solid var(--bdr)}

/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--bg1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:50;flex-shrink:0}

/* COMPONENTS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 16px;border-radius:6px;font-size:13px;font-weight:500;transition:all .14s;border:1px solid transparent;cursor:pointer;white-space:nowrap}
.btn-gold{background:var(--gold);color:#1a0e00;border-color:var(--gold)}
.btn-gold:hover{background:var(--gold2)}
.btn-teal{background:var(--teal);color:#03120e;border-color:var(--teal)}
.btn-teal:hover{background:#22e4bc}
.btn-outline{background:transparent;color:var(--txt0);border-color:var(--bdr2)}
.btn-outline:hover{background:var(--bg3)}
.btn-ghost{background:transparent;color:var(--txt1);border-color:transparent}
.btn-ghost:hover{background:var(--bg3);color:var(--txt0)}
.btn-danger{background:var(--red2);color:var(--red);border-color:rgba(224,85,85,.28)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-lg{padding:10px 24px;font-size:14px}

.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:9px}
.card-gold{background:var(--gold4);border:1px solid rgba(200,151,58,.18);border-radius:9px}
.card-red{background:var(--red2);border:1px solid rgba(224,85,85,.22);border-radius:9px}
.card-teal{background:var(--teal3);border:1px solid rgba(29,201,168,.16);border-radius:9px}

.tag{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.tt{background:var(--teal2);color:var(--teal);border:1px solid rgba(29,201,168,.2)}
.tg{background:var(--gold3);color:var(--gold2);border:1px solid rgba(200,151,58,.2)}
.tb{background:var(--blue2);color:var(--blue);border:1px solid rgba(77,158,248,.2)}
.ta{background:var(--amber2);color:var(--amber);border:1px solid rgba(224,152,64,.2)}
.tr{background:var(--red2);color:var(--red);border:1px solid rgba(224,85,85,.2)}
.tv{background:var(--violet2);color:var(--violet);border:1px solid rgba(155,110,240,.2)}
.tm{background:var(--bg3);color:var(--txt2);border:1px solid var(--bdr)}

.input{background:var(--bg2);border:1px solid var(--bdr2);border-radius:6px;color:var(--txt0);padding:8px 12px;font-size:13px;width:100%;outline:none;transition:border-color .15s}
.input:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(200,151,58,.07)}
.input::placeholder{color:var(--txt3)}
.sel{background:var(--bg2);border:1px solid var(--bdr2);border-radius:6px;color:var(--txt0);padding:7px 12px;font-size:12px;outline:none;cursor:pointer}
.lbl{display:block;font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--bdr);white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--bdr);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.012)}
.tbl th input[type=checkbox],.tbl td input[type=checkbox]{accent-color:var(--gold);width:14px;height:14px;cursor:pointer}

/* STAT */
.sc{background:var(--bg2);border:1px solid var(--bdr);border-radius:9px;padding:16px 18px}
.sc-l{font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px}
.sc-v{font-size:26px;font-weight:400;font-family:var(--fd);line-height:1.1}
.sc-s{font-size:11px;color:var(--txt3);margin-top:3px}
.kup{color:var(--teal)}.kdn{color:var(--red)}

/* PROGRESS */
.pb{height:3px;background:rgba(255,255,255,.04);border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px}

/* MISC */
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
.dt{background:var(--teal)}.dr{background:var(--red)}.da{background:var(--amber)}.db{background:var(--blue)}.dm{background:var(--txt3)}
.div{border:none;border-top:1px solid var(--bdr)}
.ndot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid var(--bg1)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0}
.ph{font-family:var(--fd);font-size:20px;font-weight:500;letter-spacing:.01em}
.ps{font-size:12px;color:var(--txt2);margin-top:1px}
.sth{font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.1em}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}
.page-body{padding:22px 24px}
.notice{border-radius:7px;padding:11px 14px;font-size:12px;line-height:1.65}
.nb{background:var(--blue2);border:1px solid rgba(77,158,248,.2);color:var(--txt1)}
.na{background:var(--amber2);border:1px solid rgba(224,152,64,.2);color:var(--txt1)}
.nr{background:var(--red2);border:1px solid rgba(224,85,85,.2);color:var(--txt1)}
.nt{background:var(--teal3);border:1px solid rgba(29,201,168,.16);color:var(--txt1)}

@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .26s ease forwards}
</style>
</head>
<body>
<div class="shell" id="app"></div>

<script>
// ── DATA ──────────────────────────────────────────

  {id:2,user:'AgroSense',type:'Advisory Retainer',amount:2800,status:'succeeded',date:'Jan 1',method:'Card',ref:'INV-040'},

// ── HELPERS ──
function stag(s){
  const m={active:'tt',pending:'ta',suspended:'tr',succeeded:'tt',failed:'tr',past_due:'ta',upcoming:'tb',completed:'tm',open:'tt',waitlist:'ta','intro sent':'tb','meeting scheduled':'tt','profile shared':'ta',declined:'tr',company:'tt',partner:'tb',advisor:'ta',advisory:'tg',pro:'tt',program:'tm',expert:'tb',partner_tier:'tb'};
  const display=s?.replace(/_/g,' ');
  const cls=m[s?.toLowerCase()]||'tm';
  return `<span class="tag ${cls}">${display}</span>`;
}
function sc(l,v,s='',accent=false,chDir=''){
  const chStyle=chDir==='up'?' style="color:var(--teal)"':chDir==='dn'?' style="color:var(--red)"':'';
  return `<div class="sc"><div class="sc-l">${l}</div><div class="sc-v"${accent?' style="color:var(--gold2)"':''}>${v}</div>${s?`<div class="sc-s"${chStyle}>${s}</div>`:''}</div>`;
}
function pb(pct,color='var(--teal)'){return `<div class="pb"><div class="pf" style="width:${Math.min(100,pct)}%;background:${color}"></div></div>`;}

</div>`;}

function pageOverview(){

        <div class="sth" style="margin-bottom:10px">Revenue Trend</div>
        <div class="card" style="padding:18px">
          <div style="font-family:var(--fd);font-size:26px;font-weight:400;margin-bottom:2px">S$47,200 <span style="font-size:14px;color:var(--teal)">↑ 9.8%</span></div>
          <div style="font-size:11px;color:var(--txt2);margin-bottom:16px">vs S$43,000 last month</div>
          <div style="display:flex;align-items:flex-end;gap:5px;height:80px;margin-bottom:6px">
            ${MRR_D.map((v,i)=>{const h=Math.max(6,v/maxM*76);const last=i===MRR_D.length-1;
              return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px">
                <div style="width:100%;max-width:32px;height:${h}px;background:${last?'var(--gold)':'var(--bg4)'};border-radius:2px 2px 0 0;opacity:${last?1:.65};position:relative" title="S$${(v*1000).toLocaleString()}"></div>
              </div>`;}).join('')}
          </div>
          <div style="display:flex;justify-content:space-between">${MTHS.map(m=>`<span style="font-size:10px;color:var(--txt3);flex:1;text-align:center">${m}</span>`).join('')}</div>

      </div>

function pageUsers(){
  let filter='all';let search='';
  const render=()=>{
    const list=USERS.filter(u=>{
      const fMatch=filter==='all'||u.status===filter||u.role===filter;
      const sMatch=!search||u.name.toLowerCase().includes(search.toLowerCase())||u.email.toLowerCase().includes(search.toLowerCase())||u.company.toLowerCase().includes(search.toLowerCase());
      return fMatch&&sMatch;
    });

    const inner=document.getElementById('user-table-inner');
    if(!inner)return;
    inner.innerHTML=`
      <table class="tbl">
        <thead><tr>
          <th style="width:32px"><input type="checkbox" onchange="toggleAllSelect(this)"/></th>
          <th>Name</th><th>Role</th><th>Status</th><th>Tier</th><th>Fee</th><th>Country</th><th>Joined</th><th>Actions</th>
        </tr></thead>
        <tbody>
          ${list.map(u=>`<tr>
            <td><input type="checkbox" ${selected.has(u.id)?'checked':''} onchange="toggleSelect(${u.id},this.checked)"/></td>
            <td><div style="display:flex;gap:8px;align-items:center">
              <div class="av" style="width:26px;height:26px;font-size:10px;background:var(--bg3);border:1px solid var(--bdr2);color:${u.role==='company'?'var(--teal)':u.role==='partner'?'var(--blue)':'var(--amber)'}">${u.name.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>
              <div><div style="font-weight:500;font-size:13px">${u.name}</div><div style="font-size:11px;color:var(--txt2)">${u.email}</div></div>
            </div></td>
            <td>${stag(u.role)}</td>
            <td>${stag(u.status)}</td>
            <td><span class="tag tm" style="font-size:10px;text-transform:capitalize">${u.tier}</span></td>
            <td><span style="font-size:12px;color:${u.fee?'var(--teal)':'var(--red)'}"><b>${u.fee?'✓':'✕'}</b> ${u.fee?'Paid':'Unpaid'}</span></td>
            <td style="font-size:12px;color:var(--txt2)">${u.country}</td>
            <td style="font-size:11px;color:var(--txt2)">${u.joined}</td>
            <td><div style="display:flex;gap:4px">
              ${u.status==='pending'?`<button class="btn btn-teal btn-xs" onclick="approveUser(${u.id})">Approve</button>`:''}
              ${u.status==='active'?`<button class="btn btn-outline btn-xs" onclick="suspendUser(${u.id})">Suspend</button>`:''}
              ${u.status==='suspended'?`<button class="btn btn-outline btn-xs" style="color:var(--teal)" onclick="alert('User ${u.name} restored')">Restore</button>`:''}
              <button class="btn btn-ghost btn-xs" onclick="showUserDetail(${u.id})">View</button>
            </div></td>
          </tr>`).join('')}
        </tbody>
      </table>`;
  };

  setTimeout(render,10);
  const filterBtns=[{k:'all',l:'All'},{k:'active',l:'Active'},{k:'pending',l:'Pending'},{k:'suspended',l:'Suspended'},{k:'company',l:'Companies'},{k:'partner',l:'Partners'},{k:'advisor',l:'Advisors'}];

  return `${tb()}
  <div class="page-body fu">
    <div class="g4" style="margin-bottom:14px">
      ${['All','Active','Pending','Suspended'].map((l,i)=>{
        const counts=[USERS.length,USERS.filter(u=>u.status==='active').length,USERS.filter(u=>u.status==='pending').length,USERS.filter(u=>u.status==='suspended').length];
        return `<div class="sc" style="cursor:pointer" onclick="setUserFilter('${l.toLowerCase()}')"><div class="sc-l">${l}</div><div class="sc-v">${counts[i]}</div></div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap">
      <div style="flex:1;min-width:200px;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--bdr2);border-radius:6px;padding:7px 12px">
        <span style="color:var(--txt3)">🔍</span>
        <input id="userSearch" style="background:none;border:none;outline:none;color:var(--txt0);font-size:13px;flex:1" placeholder="Search name, email, company..." oninput="filterUsers(this.value)"/>
      </div>
      <select class="sel" id="userFilter" onchange="setUserFilter(this.value)">
        ${filterBtns.map(f=>`<option value="${f.k}">${f.l}</option>`).join('')}
      </select>
      <div id="bulk-actions" style="display:none;gap:8px">
        <button class="btn btn-teal btn-sm" id="bulk-approve-btn" onclick="bulkApprove()">Approve Selected</button>
      </div>
      <button class="btn btn-gold btn-sm">+ Invite Member</button>
    </div>
    <div class="card" style="overflow:hidden" id="user-table-inner"></div>
  </div>
  <script>
    function setUserFilter(v){filter=v;document.getElementById('userFilter').value=v;render();}
    function filterUsers(v){search=v;render();}
    function toggleSelect(id,checked){if(checked)selected.add(id);else selected.delete(id);document.getElementById('bulk-actions').style.display=selected.size?'flex':'none';render();}
    function toggleAllSelect(el){USERS.forEach(u=>{if(el.checked)selected.add(u.id);else selected.delete(u.id);});document.getElementById('bulk-actions').style.display=selected.size?'flex':'none';render();}
    function bulkApprove(){selected.forEach(id=>{const u=USERS.find(u=>u.id===id);if(u)u.status='active';});selected.clear();document.getElementById('bulk-actions').style.display='none';render();}
    function showUserDetail(id){const u=USERS.find(u=>u.id===id);if(!u)return;alert('User detail: '+u.name+'\\n'+u.email+'\\n'+u.company+'\\nRole: '+u.role+'\\nStatus: '+u.status+'\\nSessions: '+u.sessions);}
  <\/script>`;
}

function approveUser(id){const u=USERS.find(u=>u.id===id);if(u){u.status='active';goto(currentPage);}}
function rejectUser(id){const u=USERS.find(u=>u.id===id);if(u&&confirm('Reject '+u.name+'?')){u.status='rejected';goto(currentPage);}}
function suspendUser(id){const u=USERS.find(u=>u.id===id);if(u&&confirm('Suspend '+u.name+'?')){u.status='suspended';goto(currentPage);}}

      <div>
        <div class="sth" style="margin-bottom:12px">Subscription Plans</div>
        <div class="card" style="padding:16px;margin-bottom:14px">
          ${[['Program','S$198/mo'],['Pro','S$396/mo'],['Advisory','Custom — from S$2,800/mo'],['Capital Partner','S$500/mo']].map(([l,v])=>`
            <div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:13px">
              <span style="color:var(--txt2)">${l}</span>
              <div style="display:flex;gap:8px;align-items:center">
                <span style="font-family:var(--fm);font-size:12px;color:var(--teal)">${v}</span>
                <button class="btn btn-ghost btn-xs">Edit</button>
              </div>
            </div>`).join('')}
        </div>
        <div class="sth" style="margin-bottom:12px">Legal & Compliance</div>
        <div class="card-gold" style="padding:16px">
          <div style="font-size:12px;font-weight:600;color:var(--gold2);margin-bottom:8px">⚖️ Compliance Checklist</div>
          ${['Capital matching templates include MAS disclaimer','Advisor profiles state "Not a licensed financial advisor"','Website footer includes regulatory notice','Terms of Use explicitly limits capital introduction scope'].map(item=>`
            <div style="display:flex;gap:8px;padding:6px 0;border-bottom:1px solid rgba(200,151,58,.12);font-size:12px;color:var(--txt1)">
              <span style="color:var(--teal);flex-shrink:0">✓</span>${item}
            </div>`).join('')}
        </div>
      </div>
    </div>
  </div>`;
}

// ── ROUTER ──────────────────────────────────────────
function goto(pg){
  currentPage=pg;
  const app=document.getElementById('app');
  const pages={overview:pageOverview,users:pageUsers,programs:pagePrograms,sessions:pageSessions,matches:pageMatches,payments:pagePayments,settings:pageSettings};
  const content=pages[pg]?pages[pg]():`<div class="page-body">Not found</div>`;
  app.innerHTML=`${makeSidebar()}<div class="main">${content}</div>`;
}

goto('overview');
</script>
