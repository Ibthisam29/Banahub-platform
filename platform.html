<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BANAHub Platform — Member Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#090b14;--bg1:#0d1020;--bg2:#12162a;--bg3:#181c34;--bg4:#1e233e;
  --bdr:#21264a;--bdr2:#2a3056;--bdr3:#363d68;
  --teal:#1dc9a8;--teal2:rgba(29,201,168,.13);--teal3:rgba(29,201,168,.06);
  --gold:#c8973a;--gold2:#e0b354;--gold3:rgba(200,151,58,.14);--gold4:rgba(200,151,58,.05);
  --blue:#4d9ef8;--blue2:rgba(77,158,248,.13);
  --violet:#9b6ef0;--violet2:rgba(155,110,240,.13);
  --amber:#e09840;--amber2:rgba(224,152,64,.13);
  --red:#e05555;--red2:rgba(224,85,85,.12);
  --txt0:#dde6f8;--txt1:#8895b8;--txt2:#505f82;--txt3:#323b5e;
  --fd:'Cormorant Garamond',Georgia,serif;
  --fb:'Outfit',sans-serif;
  --fm:'JetBrains Mono',monospace;
}
*{font-family:var(--fb)}
html,body{height:100%;background:var(--bg);color:var(--txt0);font-size:14px;line-height:1.6;-webkit-font-smoothing:antialiased}
::selection{background:var(--teal2);color:var(--teal)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg1)}
::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px}
button{cursor:pointer}

/* LAYOUT */
.shell{display:flex;height:100vh;overflow:hidden}
.sidebar{width:232px;min-width:232px;background:var(--bg1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;height:100vh;position:sticky;top:0}
.sb-logo{padding:20px 18px 14px;border-bottom:1px solid var(--bdr)}
.sb-lm{width:28px;height:28px;background:linear-gradient(135deg,var(--teal),#0e9e81);border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:600;font-size:13px;color:#040f0c;flex-shrink:0}
.sb-ln{font-family:var(--fd);font-size:17px;font-weight:500;letter-spacing:.05em}
.sb-ln em{color:var(--teal);font-style:italic}
.sb-user{padding:10px 10px;border-bottom:1px solid var(--bdr)}
.sb-user-inner{display:flex;align-items:center;gap:9px;padding:8px 9px;border-radius:7px;background:var(--bg3)}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:500;flex-shrink:0}
.sb-nav{flex:1;overflow-y:auto;padding:8px 8px}
.nav-sec{padding:12px 8px 5px;font-size:10px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.12em}
.ni{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:6px;font-size:13px;color:var(--txt1);cursor:pointer;transition:all .12s;margin-bottom:1px}
.ni:hover{background:var(--bg3);color:var(--txt0)}
.ni.on{background:var(--teal2);color:var(--teal);border:1px solid rgba(29,201,168,.18)}
.ni-ic{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.sb-bottom{padding:10px 10px;border-top:1px solid var(--bdr)}
.role-sw{font-size:10px;color:var(--txt3);margin-bottom:6px}
.role-btns{display:grid;grid-template-columns:1fr 1fr;gap:4px}

/* MAIN */
.main{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.topbar{height:52px;background:var(--bg1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 24px;gap:12px;position:sticky;top:0;z-index:50;flex-shrink:0}
.page-body{padding:24px 26px;flex:1}

/* TYPOGRAPHY */
.ph{font-family:var(--fd);font-size:20px;font-weight:500;letter-spacing:.01em}
.ps{font-size:12px;color:var(--txt2);margin-top:1px}
.sth{font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.1em}

/* COMPONENTS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 16px;border-radius:6px;font-size:13px;font-weight:500;transition:all .14s;border:1px solid transparent;cursor:pointer;white-space:nowrap}
.btn-teal{background:var(--teal);color:#04120e;border-color:var(--teal)}
.btn-teal:hover{background:#22e4bc}
.btn-outline{background:transparent;color:var(--txt0);border-color:var(--bdr2)}
.btn-outline:hover{background:var(--bg3)}
.btn-ghost{background:transparent;color:var(--txt1);border-color:transparent}
.btn-ghost:hover{background:var(--bg3);color:var(--txt0)}
.btn-gold{background:var(--gold);color:#1c1400;border-color:var(--gold)}
.btn-gold:hover{background:var(--gold2)}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-xs{padding:3px 8px;font-size:11px}
.btn-lg{padding:10px 24px;font-size:14px}
.btn-danger{background:var(--red2);color:var(--red);border-color:rgba(224,85,85,.28)}

.card{background:var(--bg2);border:1px solid var(--bdr);border-radius:9px}
.card-e{background:var(--bg3);border:1px solid var(--bdr2);border-radius:8px}
.card-teal{background:var(--teal3);border:1px solid rgba(29,201,168,.18);border-radius:9px}
.card-gold{background:var(--gold4);border:1px solid rgba(200,151,58,.18);border-radius:9px}

.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.tt{background:var(--teal2);color:var(--teal);border:1px solid rgba(29,201,168,.22)}
.tg{background:var(--gold3);color:var(--gold2);border:1px solid rgba(200,151,58,.22)}
.tb{background:var(--blue2);color:var(--blue);border:1px solid rgba(77,158,248,.22)}
.ta{background:var(--amber2);color:var(--amber);border:1px solid rgba(224,152,64,.22)}
.tr{background:var(--red2);color:var(--red);border:1px solid rgba(224,85,85,.22)}
.tv{background:var(--violet2);color:var(--violet);border:1px solid rgba(155,110,240,.22)}
.tm{background:var(--bg3);color:var(--txt2);border:1px solid var(--bdr)}

.input{background:var(--bg2);border:1px solid var(--bdr2);border-radius:6px;color:var(--txt0);padding:8px 12px;font-size:13px;width:100%;outline:none;transition:border-color .15s}
.input:focus{border-color:var(--teal);box-shadow:0 0 0 2px rgba(29,201,168,.07)}
.input::placeholder{color:var(--txt3)}
.sel{background:var(--bg2);border:1px solid var(--bdr2);border-radius:6px;color:var(--txt0);padding:8px 12px;font-size:13px;outline:none;cursor:pointer}
.lbl{display:block;font-size:11px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:12px}

/* TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:8px 12px;font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid var(--bdr);white-space:nowrap}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--bdr);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:rgba(255,255,255,.015)}

/* STAT */
.sc{background:var(--bg2);border:1px solid var(--bdr);border-radius:9px;padding:16px 18px}
.sc-l{font-size:10px;font-weight:600;color:var(--txt2);text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px}
.sc-v{font-size:26px;font-weight:400;font-family:var(--fd);line-height:1.1}
.sc-s{font-size:11px;color:var(--txt3);margin-top:3px}
.kup{color:var(--teal)}.kdn{color:var(--red)}

/* PROGRESS */
.pb{height:3px;background:var(--bg4,var(--bg3));border-radius:2px;overflow:hidden}
.pf{height:100%;border-radius:2px;transition:width .4s}

/* DOT */
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;display:inline-block}
.dt{background:var(--teal)}.dr{background:var(--red)}.da{background:var(--amber)}.db{background:var(--blue)}.dm{background:var(--txt3)}

/* NOTIF */
.ndot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid var(--bg1)}

/* DIVIDER */
.div{border:none;border-top:1px solid var(--bdr)}

/* NOTICE */
.notice{border-radius:7px;padding:12px 16px;font-size:12px;line-height:1.65}
.nb{background:var(--blue2);border:1px solid rgba(77,158,248,.2);color:var(--txt1)}
.na{background:var(--amber2);border:1px solid rgba(224,152,64,.2);color:var(--txt1)}
.nt{background:var(--teal3);border:1px solid rgba(29,201,168,.18);color:var(--txt1)}

/* ANIM */
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .28s ease forwards}
@keyframes ps{0%,100%{opacity:1}50%{opacity:.3}}
.pulse{animation:ps 2s infinite}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(6,8,16,.88);z-index:200;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--bdr2);border-radius:12px;padding:28px;width:90%;max-width:460px;max-height:85vh;overflow-y:auto}
</style>
</head>
<body>
<div class="shell" id="app"></div>

<script>
// ── DATA ──────────────────────────────────────────
const PROGRAMS=[
  {id:1,title:'GTM Accelerator Cohort',cat:'Cohort',format:'8-Week',icon:'🚀',color:'var(--teal)',price:'S$2,800',seats:12,enrolled:9,weekNo:3,totalWeeks:8,nextDate:'Jan 12, 3:00 PM SGT',topic:'Channel Strategy Deep Dive',status:'active'},
  {id:2,title:'Market Entry: Southeast Asia',cat:'Masterclass',format:'3-Day',icon:'🌏',color:'var(--gold2)',price:'S$980',seats:20,enrolled:20,status:'waitlist'},
  {id:3,title:'Investor Readiness Workshop',cat:'Workshop',format:'1-Day',icon:'📋',color:'var(--violet)',price:'S$480',seats:16,enrolled:11,status:'open'},
  {id:4,title:'Revenue Architecture',cat:'Cohort',format:'6-Week',icon:'📈',color:'var(--amber)',price:'S$3,200',seats:8,enrolled:5,status:'open'},
  {id:5,title:'B2B Sales Playbook',cat:'Workshop',format:'2-Day',icon:'🎯',color:'var(--blue)',price:'S$680',seats:18,enrolled:14,status:'open'},
];
const SESSIONS=[
  {id:1,client:'NexusPay',advisor:'Ibthisam Hashim',topic:'GTM Channel Strategy Review',date:'Jan 12',time:'3:00 PM SGT',status:'upcoming',type:'Strategy'},
  {id:2,client:'NexusPay',advisor:'Sarah Chen',topic:'Indonesia Market Entry Brief',date:'Jan 15',time:'2:00 PM SGT',status:'upcoming',type:'Market Entry'},
  {id:3,client:'NexusPay',advisor:'Ibthisam Hashim',topic:'Q1 GTM Planning Session',date:'Jan 5',time:'10:00 AM SGT',status:'completed',type:'Strategy'},
  {id:4,client:'LogiChain',advisor:'Sarah Chen',topic:'Malaysia Distribution Review',date:'Jan 8',time:'11:00 AM SGT',status:'completed',type:'Market Entry'},
];
const MATCHES=[
  {id:1,partner:'Horizon Ventures',type:'VC',stage:'Intro Sent',date:'Jan 8',note:'Fintech B2B alignment — awaiting response'},
  {id:2,partner:'Apex Capital Partners',stage:'Meeting Scheduled',type:'PE',date:'Jan 6',note:'Meeting confirmed for Jan 15. Prepared deck sent.'},
  {id:3,partner:'Tanaka Family Office',stage:'Profile Shared',type:'Family Office',date:'Jan 3',note:'Executive summary shared. Awaiting review.'},
];
const COMPANIES=[
  {id:1,name:'NexusPay',industry:'Fintech / B2B SaaS',stage:'Growth',country:'SG',score:88,tier:'advisory',founder:'Priya Nair',services:['GTM Accelerator','Capital Matching'],joined:'Nov 2024'},
  {id:2,name:'LogiChain',industry:'Logistics Tech',stage:'Early Growth',country:'MY',score:74,tier:'pro',founder:'Ahmad Farid',services:['Market Entry SEA'],joined:'Dec 2024'},
  {id:3,name:'MedVault',industry:'HealthTech',stage:'Early Stage',country:'ID',score:62,tier:'program',founder:'Siti Rahma',services:['Investor Readiness'],joined:'Jan 2025'},
  {id:4,name:'AgroSense',industry:'AgriTech',stage:'Scale',country:'TH',score:93,tier:'advisory',founder:'Tanawat K.',services:['Revenue Architecture','Capital Matching'],joined:'Oct 2024'},
  {id:5,name:'EduBridge',industry:'EdTech',stage:'Early Stage',country:'PH',score:70,tier:'program',founder:'Maria Santos',services:['B2B Sales Playbook'],joined:'Jan 2025'},
];
const REQS=[
  {id:1,from:'NexusPay',svc:'Indonesia Market Entry',advisor:'Sarah Chen',date:'Jan 9',status:'new'},
  {id:2,from:'LogiChain',svc:'GTM Strategy Review',advisor:'Ibthisam Hashim',date:'Jan 8',status:'quoted'},
  {id:3,from:'AgroSense',svc:'Revenue Architecture',advisor:'Raj Menon',date:'Jan 6',status:'accepted'},
  {id:4,from:'EduBridge',svc:'B2B Sales Review',advisor:'Sarah Chen',date:'Jan 3',status:'completed'},
];

// ── HELPERS ──────────────────────────────────────
const h=(tag,cls,inner,attrs={})=>{
  const el=document.createElement(tag);
  if(cls)el.className=cls;
  if(inner)el.innerHTML=inner;
  Object.entries(attrs).forEach(([k,v])=>{el[k]=v;});
  return el;
};
let currentRole='company';
let currentPage='co-overview';

// ── TAG HELPER ──
function statusTag(s){
  const map={upcoming:'tb',active:'tt',completed:'tm',open:'tt',waitlist:'ta',new:'tg','quoted':'tb',accepted:'tt',completed:'tm','intro sent':'tb','meeting scheduled':'tt','profile shared':'ta',declined:'tr',pro:'tt',advisory:'tg',program:'tm','early growth':'tb','growth':'tt','scale':'tg','early stage':'tm'};
  return `<span class="tag ${map[s?.toLowerCase()]||'tm'}">${s}</span>`;
}
function pbar(pct,color='var(--teal)'){return `<div class="pb"><div class="pf" style="width:${pct}%;background:${color}"></div></div>`;}
function sc(label,value,sub='',accent=false){return `<div class="sc"><div class="sc-l">${label}</div><div class="sc-v"${accent?' style="color:var(--teal)"':''}>${value}</div>${sub?`<div class="sc-s">${sub}</div>`:''}</div>`;}

// ── LOGO ──
function logoHTML(sm=false){
  return `<div style="display:flex;align-items:center;gap:9px">
    <div class="sb-lm">B</div>
    <div class="sb-ln" style="font-size:${sm?'14':'17'}px">BANA<em>Hub</em></div>
  </div>`;
}

// ── SIDEBAR ──
function makeSidebar(){
  const nav={
    company:[
      {s:'My Dashboard'},{k:'co-overview',i:'⊞',l:'Overview'},
      {s:'Growth Programs'},{k:'co-programs',i:'🚀',l:'My Programs'},{k:'co-sessions',i:'📅',l:'Advisory Sessions'},{k:'co-gtm',i:'🎯',l:'GTM Tracker'},
      {s:'Capital'},{k:'co-matches',i:'🤝',l:'Capital Matching'},{k:'co-profile',i:'👤',l:'My Profile'},
    ],
    partner:[
      {s:'Dashboard'},{k:'pa-overview',i:'⊞',l:'Overview'},
      {s:'Deal Flow'},{k:'pa-companies',i:'🏢',l:'Company Profiles'},{k:'pa-intros',i:'🤝',l:'Introductions'},{k:'pa-watchlist',i:'⭐',l:'Watchlist'},
    ],
    advisor:[
      {s:'Dashboard'},{k:'ad-overview',i:'⊞',l:'Overview'},
      {s:'Work'},{k:'ad-sessions',i:'📅',l:'My Sessions'},{k:'ad-programs',i:'📚',l:'Programs'},{k:'ad-requests',i:'📩',l:'Service Requests'},
    ],
  };
  const roleColor={company:'var(--teal)',partner:'var(--blue)',advisor:'var(--amber)'};
  const roleName={company:'Priya Nair · NexusPay',partner:'Marcus Tan · Horizon Ventures',advisor:'Sarah Chen · Expert Advisor'};
  const roleTag={company:'Company Member',partner:'Capital Partner',advisor:'Expert Advisor'};
  const roleTagCls={company:'tt',partner:'tb',advisor:'ta'};
  const initials=roleName[currentRole].split(' ').map(w=>w[0]).join('').slice(0,2);

  let navHTML='';
  (nav[currentRole]||[]).forEach(item=>{
    if(item.s){navHTML+=`<div class="nav-sec">${item.s}</div>`;}
    else{navHTML+=`<div class="ni${currentPage===item.k?' on':''}" onclick="goto('${item.k}')" style="cursor:pointer"><span class="ni-ic">${item.i}</span>${item.l}</div>`;}
  });

  return `<div class="sidebar">
    <div class="sb-logo">${logoHTML()}</div>
    <div class="sb-user">
      <div class="sb-user-inner">
        <div class="av" style="width:30px;height:30px;font-size:11px;background:var(--bg4);border:1px solid var(--bdr2);color:${roleColor[currentRole]}">${initials}</div>
        <div style="flex:1;overflow:hidden">
          <div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${roleName[currentRole]}</div>
          <span class="tag ${roleTagCls[currentRole]}" style="font-size:10px;padding:1px 6px">${roleTag[currentRole]}</span>
        </div>
      </div>
    </div>
    <div class="sb-nav">
      ${navHTML}
      <div class="div" style="margin:10px 0 5px"></div>
      <div class="ni" onclick="goto('billing')"><span class="ni-ic">💳</span>Billing</div>
      <div class="ni" onclick="window.location.href='banahub-website.html'"><span class="ni-ic">↩</span>Back to Website</div>
    </div>
    <div class="sb-bottom">
      <div class="role-sw">Switch Role (Demo)</div>
      <div class="role-btns">
        ${['company','partner','advisor'].map(r=>`<button class="btn ${currentRole===r?'btn-teal':'btn-outline'}" style="font-size:11px;padding:4px 0" onclick="switchRole('${r}')">${r==='company'?'🏢':r==='partner'?'💼':'🎓'} ${r}</button>`).join('')}
        <a href="banahub-admin.html"><button class="btn btn-outline" style="font-size:11px;padding:4px 0">⚙️ admin</button></a>
      </div>
    </div>
  </div>`;
}

// ── TOPBAR ──
function makeTopbar(title,sub,actions=''){
  return `<div class="topbar">
    <div style="flex:1"><div class="ph">${title}</div>${sub?`<div class="ps">${sub}</div>`:''}</div>
    ${actions?`<div style="display:flex;align-items:center;gap:8px">${actions}</div>`:''}
    <div style="position:relative;cursor:pointer">
      <div style="width:32px;height:32px;border-radius:50%;background:var(--bg3);border:1px solid var(--bdr2);display:flex;align-items:center;justify-content:center;font-size:14px">🔔</div>
      <div class="ndot"></div>
    </div>
  </div>`;
}

// ── PAGES ──────────────────────────────────────────

function pageCoOverview(){
  return `${makeTopbar('My Dashboard','NexusPay · Advisory Member',
    `<button class="btn btn-outline btn-sm" onclick="goto('co-sessions')">Book Session</button>
     <button class="btn btn-teal btn-sm" onclick="goto('co-programs')">Browse Programs</button>`)}
  <div class="page-body fu">
    <div class="g4" style="margin-bottom:16px">
      ${sc('Active Programs','2','GTM Accelerator + Market Entry')}
      ${sc('Advisory Sessions','8','4 remaining this quarter')}
      ${sc('GTM Progress Score','78%','↑ 6pts this month',true)}
      ${sc('Capital Introductions','2','1 meeting scheduled')}
    </div>
    <div class="g2">
      <div>
        <div class="sth" style="margin-bottom:10px">Active Programs</div>
        ${PROGRAMS.filter(p=>p.status==='active').map(p=>`
          <div class="card" style="padding:16px;margin-bottom:10px">
            <div style="display:flex;gap:10px;align-items:flex-start;margin-bottom:12px">
              <div style="font-size:24px;flex-shrink:0">${p.icon}</div>
              <div style="flex:1">
                <div style="font-size:14px;font-weight:500;margin-bottom:2px;color:${p.color}">${p.title}</div>

              </div>

            </div>
            <div style="font-size:12px;color:var(--txt1);margin-bottom:8px">Next: ${p.topic} · ${p.nextDate}</div>
            ${pbar(Math.round(p.weekNo/p.totalWeeks*100))}
            <div style="font-size:10px;color:var(--txt3);margin-top:3px">${Math.round(p.weekNo/p.totalWeeks*100)}% complete</div>
          </div>`).join('')}

        <div class="sth" style="margin-bottom:10px;margin-top:16px">Upcoming Sessions</div>
        ${SESSIONS.filter(s=>s.status==='upcoming').map(s=>`
          <div class="card" style="padding:12px;margin-bottom:6px;display:flex;gap:10px;align-items:center">
            <span style="font-size:20px;flex-shrink:0">📅</span>
            <div style="flex:1">
              <div style="font-size:13px;font-weight:500">${s.topic}</div>
              <div style="font-size:11px;color:var(--txt2)">${s.advisor} · ${s.date} · ${s.time}</div>
            </div>
            <button class="btn btn-teal btn-xs">Join</button>
          </div>`).join('')}
      </div>
      <div>
        <div class="sth" style="margin-bottom:10px">GTM Progress</div>
        <div class="card" style="padding:16px;margin-bottom:14px">
          ${[['ICP Definition',90,'var(--teal)'],['Channel Strategy',72,'var(--teal)'],['Outbound Playbook',55,'var(--amber)'],['Sales Pipeline Build',40,'var(--amber)'],['Market Entry Plan',25,'var(--txt3)']].map(([l,v,c])=>`
            <div style="margin-bottom:13px">
              <div style="display:flex;justify-content:space-between;margin-bottom:4px;font-size:12px">
                <span style="color:var(--txt1)">${l}</span>

function goto(pg){
  currentPage=pg;
  render();
  window.scrollTo(0,0);
}

function switchRole(r){
  currentRole=r;
  const defaults={company:'co-overview',partner:'pa-overview',advisor:'ad-overview'};
  currentPage=defaults[r];
  render();
}

function render(){
  const app=document.getElementById('app');
  const pageContent=PAGES[currentPage]?PAGES[currentPage]():`<div class="page-body">Page not found</div>`;
  app.innerHTML=`
    ${makeSidebar()}
    <div class="main">
      ${pageContent}
    </div>`;
}
