<!-- NAV TEMPLATE — included via nav.js on every page -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"/>

<nav class="nav-bar" id="main-nav">
  <div class="nav-inner">
    <!-- Logo -->
    <a href="index.html" class="nav-logo" id="nav-logo-link">BANAHub</a>

    <!-- Primary links -->
    <div class="nav-links" id="nav-links">
      <a href="platform.html"     class="nav-link">Platform</a>
      <a href="cross-border.html" class="nav-link">Expansion</a>
      <a href="capital.html"      class="nav-link">Capital</a>
      <a href="incubation.html"   class="nav-link">Programs</a>
      <a href="partnerships.html" class="nav-link">Partners</a>
      <a href="pricing.html"      class="nav-link">Pricing</a>
    </div>

    <!-- CTA -->
    <div class="nav-cta" id="nav-cta">
      <a href="login.html"    class="btn btn-ghost btn-sm"   id="nav-login">Login</a>
      <a href="apply.html"    class="btn btn-primary btn-sm" id="nav-apply">Apply Now</a>
    </div>

    <!-- Mobile toggle -->
    <button class="nav-mobile-toggle" id="nav-toggle" aria-label="Menu" style="display:none;background:none;border:none;cursor:pointer;padding:8px;">
      <span class="material-symbols-outlined" style="font-size:24px;color:var(--on-surface)">menu</span>
    </button>
  </div>

  <!-- Mobile drawer -->
  <div id="mobile-menu" style="display:none;flex-direction:column;gap:4px;padding:12px 20px 20px;background:var(--white);border-top:1px solid var(--outline-lt);">
    <a href="platform.html"     style="padding:10px 12px;font-size:15px;color:var(--on-surface);border-radius:6px;">Platform</a>
    <a href="cross-border.html" style="padding:10px 12px;font-size:15px;color:var(--on-surface);border-radius:6px;">Cross-Border Expansion</a>
    <a href="capital.html"      style="padding:10px 12px;font-size:15px;color:var(--on-surface);border-radius:6px;">Capital Readiness</a>
    <a href="incubation.html"   style="padding:10px 12px;font-size:15px;color:var(--on-surface);border-radius:6px;">Programs</a>
    <a href="pricing.html"      style="padding:10px 12px;font-size:15px;color:var(--on-surface);border-radius:6px;">Pricing</a>
    <div style="display:flex;gap:10px;padding:12px 12px 0;border-top:1px solid var(--outline-lt);margin-top:8px;">
      <a href="login.html" class="btn btn-ghost" style="flex:1;text-align:center;">Login</a>
      <a href="apply.html" class="btn btn-primary" style="flex:1;text-align:center;">Apply Now</a>
    </div>
  </div>
</nav>

<script>
(function() {
  // Auth-aware nav
  const token = localStorage.getItem('bana_access_token');
  const user  = JSON.parse(localStorage.getItem('bana_user') || '{}');
  if (token) {
    const role = user.role || 'member';
    const dest = role === 'admin' ? 'admin.html' : role === 'investor' ? 'dashboard-investor.html' : role === 'provider' ? 'dashboard-provider.html' : 'dashboard-business.html';
    const login = document.getElementById('nav-login');
    const apply = document.getElementById('nav-apply');
    if (login) { login.href = dest; login.textContent = 'Dashboard'; }
    if (apply) { apply.href = dest; apply.textContent = 'My Portal'; apply.className = 'btn btn-primary btn-sm'; }
  }

  // Active link
  const path = location.pathname.split('/').pop();
  document.querySelectorAll('.nav-link').forEach(a => {
    if (a.getAttribute('href') === path) a.classList.add('active');
  });

  // Logo 4-click admin
  let clicks = 0, timer;
  const logo = document.getElementById('nav-logo-link');
  if (logo) logo.addEventListener('click', (e) => {
    clicks++;
    clearTimeout(timer);
    timer = setTimeout(() => { clicks = 0; }, 1800);
    if (clicks === 4) {
      e.preventDefault(); clicks = 0;
      const m = document.getElementById('admin-modal-overlay');
      if (m) { m.style.display = 'flex'; document.getElementById('admin-email')?.focus(); }
    }
  });

  // Mobile nav
  const toggle = document.getElementById('nav-toggle');
  const mob    = document.getElementById('mobile-menu');
  if (toggle && mob) {
    toggle.style.display = 'block';
    toggle.addEventListener('click', () => {
      const open = mob.style.display === 'flex';
      mob.style.display = open ? 'none' : 'flex';
      toggle.querySelector('.material-symbols-outlined').textContent = open ? 'menu' : 'close';
    });
  }

  // Scroll shadow
  window.addEventListener('scroll', () => {
    const nav = document.getElementById('main-nav');
    if (nav) nav.style.boxShadow = scrollY > 20 ? '0 2px 20px rgba(0,0,0,0.08)' : '';
  }, { passive: true });
})();
</script>
