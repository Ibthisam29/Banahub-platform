<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Provider Dashboard | BANAHub</title>
<link rel="stylesheet" href="_shared.css"/>
<style>
body{background:var(--ivory-dim)}
.dash-layout{display:grid;grid-template-columns:220px 1fr;min-height:100svh;padding-top:68px}
.dash-sidebar{background:var(--white);border-right:1px solid var(--outline-lt);padding:24px 0;position:sticky;top:68px;height:calc(100svh - 68px)}
.ds-item{display:flex;align-items:center;gap:10px;padding:10px 18px;font-size:13px;font-weight:500;color:var(--on-surface-dim);cursor:pointer;border:none;background:none;width:100%;text-align:left;transition:all .15s;border-right:2px solid transparent}
.ds-item:hover{color:var(--on-surface);background:var(--ivory-dim)}
.ds-item.active{color:var(--emerald);background:rgba(0,53,39,0.05);border-color:var(--emerald);font-weight:600}
.dash-main{padding:32px}
</style>
</head>
<body class="texture">
<div id="auth-guard" class="auth-guard"><div class="spinner"></div></div>
<nav class="nav-bar"><div class="nav-inner">
  <a href="index.html" class="nav-logo">BANAHub</a>
  <div class="nav-cta">
    <span id="nav-name" style="font-size:13px;color:var(--on-surface-dim)"></span>
    <button onclick="logout()" class="btn btn-ghost btn-sm">Sign Out</button>
  </div>
</div></nav>
<div class="dash-layout">
  <aside class="dash-sidebar">
    <button class="ds-item active" onclick="showSec('profile')">⚙️ Provider Profile</button>
    <button class="ds-item" onclick="showSec('services')">📋 Services</button>
    <button class="ds-item" onclick="showSec('expertise')">🗺️ Market Expertise</button>
    <button class="ds-item" onclick="showSec('credentials')">🏆 Credentials</button>
    <button class="ds-item" onclick="showSec('pricing')">💰 My Pricing</button>
    <button class="ds-item" onclick="showSec('requests')">📥 Incoming Requests</button>
    <button class="ds-item" onclick="showSec('billing')">💳 Billing</button>
  </aside>
  <main class="dash-main">
    <div id="sec-profile" style="display:block">
      <div style="background:var(--white);border:1px solid var(--outline-lt);border-radius:var(--r-lg);overflow:hidden">
        <div style="padding:20px 24px;border-bottom:1px solid var(--outline-lt);display:flex;justify-content:space-between;align-items:center">
          <div style="font-family:var(--font-display);font-size:18px;font-weight:500">Provider Profile</div>
          <button class="btn btn-primary btn-sm">Save</button>
        </div>
        <div style="padding:24px;display:grid;grid-template-columns:1fr 1fr;gap:20px">
          <div class="input-group"><label class="input-label">Company Name</label><input class="input"/></div>
          <div class="input-group"><label class="input-label">Provider Type</label><select class="input"><option>Legal</option><option>Finance & Tax</option><option>Technology</option><option>HR & Payroll</option><option>Compliance</option><option>Strategy & Advisory</option><option>Other</option></select></div>
          <div class="input-group" style="grid-column:span 2"><label class="input-label">Services Offered</label><textarea class="input" rows="3" style="resize:vertical" placeholder="Describe the services you provide…"></textarea></div>
          <div class="input-group"><label class="input-label">Min Rate (USD/hr)</label><input class="input" type="number" placeholder="150"/></div>
          <div class="input-group"><label class="input-label">Max Rate (USD/hr)</label><input class="input" type="number" placeholder="500"/></div>
          <div class="input-group" style="grid-column:span 2"><label class="input-label">Credentials & Certifications</label><textarea class="input" rows="2" style="resize:vertical" placeholder="Professional accreditations, bar memberships, licenses…"></textarea></div>
        </div>
      </div>
    </div>
    <div id="sec-services"    style="display:none"><div style="background:var(--white);border:1px solid var(--outline-lt);border-radius:var(--r-lg);padding:40px;text-align:center;color:var(--on-surface-dim)">Service editor coming soon</div></div>
    <div id="sec-expertise"   style="display:none"><div style="background:var(--white);border:1px solid var(--outline-lt);border-radius:var(--r-lg);padding:40px;text-align:center;color:var(--on-surface-dim)">Market expertise editor coming soon</div></div>
    <div id="sec-credentials" style="display:none"><div style="background:var(--white);border:1px solid var(--outline-lt);border-radius:var(--r-lg);padding:40px;text-align:center;color:var(--on-surface-dim)">Credentials manager coming soon</div></div>
    <div id="sec-pricing"     style="display:none"><div style="background:var(--white);border:1px solid var(--outline-lt);border-radius:var(--r-lg);padding:40px;text-align:center;color:var(--on-surface-dim)">Pricing configuration coming soon</div></div>
    <div id="sec-requests"    style="display:none"><div style="background:var(--white);border:1px solid var(--outline-lt);border-radius:var(--r-lg);padding:40px;text-align:center;color:var(--on-surface-dim)">Incoming service requests coming soon</div></div>
    <div id="sec-billing"     style="display:none"><div style="background:var(--white);border:1px solid var(--outline-lt);border-radius:var(--r-lg);padding:40px;text-align:center;color:var(--on-surface-dim)">Billing coming soon</div></div>
  </main>
</div>
<script>
(function(){
  const token=localStorage.getItem('bana_access_token');
  const user=JSON.parse(localStorage.getItem('bana_user')||'{}');
  if(!token){window.location.href='login.html';return;}
  document.getElementById('auth-guard').style.display='none';
  document.getElementById('nav-name').textContent=user.full_name||user.email||'';
})();
function showSec(id){
  document.querySelectorAll('[id^="sec-"]').forEach(e=>e.style.display='none');
  document.querySelectorAll('.ds-item').forEach(e=>e.classList.remove('active'));
  document.getElementById(`sec-${id}`).style.display='block';
  event.target.classList.add('active');
}
function logout(){localStorage.clear();window.location.href='index.html';}
</script>
</body>
</html>
